services:
  - type: web
    name: physical-ai-auth
    runtime: node
    rootDir: auth-service
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PORT
        value: "10000"
    plan: free

  - type: web
    name: physical-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: physical-ai-book
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
